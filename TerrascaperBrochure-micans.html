<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terra Scaper — Plant Care Brochure Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=Josefin+Sans:wght@300;600&display=swap"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e6e1dc; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .for-print { display: none; }
    input, textarea, select { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent,#1565a0); outline-offset: 1px; border-color: transparent !important; }
    @page { size: 297mm 210mm landscape; margin: 0; }
    @media print {
      body { background: #fff !important; margin: 0; padding: 0; }
      .no-print  { display: none !important; }
      .for-print { display: flex !important; width: 297mm; height: 210mm; page-break-after: always; overflow: hidden; }
      .print-panel-l { width: 138mm !important; height: 210mm !important; flex-shrink: 0; overflow: hidden; background: #fff; }
      .print-panel-r { width: 159mm !important; height: 210mm !important; flex-shrink: 0; overflow: hidden; background: #fff; border-left: 1px solid #eee; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  // ── Constants ──────────────────────────────────────────────────────────────
  const STORAGE_KEY = "ts_plant_library_v1";
  const CARE_ICONS  = { lighting:"☀️", temperature:"🌡️", water:"💧", substrate:"🪨", fertilizer:"🌱", co2:"💨", humidity:"🌫️", flow:"🌊" };
  const CARE_LABELS = { lighting:"Lighting", temperature:"Temperature", water:"Water / pH", substrate:"Substrate", fertilizer:"Fertilizer", co2:"CO₂", humidity:"Humidity", flow:"Flow / Watering" };
  const SKU_PREFIX  = { aquatic:"AQ", terrarium:"TR", vivarium:"VI", houseplant:"HP", exotic:"EX" };

  // ── Custom substrate icon ──────────────────────────────────────────────────
  const SubstrateIcon = () => (
    <svg width="26" height="23" viewBox="0 0 26 23" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* Ground shadow */}
      <ellipse cx="13" cy="22.2" rx="10.5" ry="1.1" fill="rgba(80,59,49,0.15)"/>
      {/* Rock 1 — large back-left, Deep Mocha family */}
      <ellipse cx="8" cy="15.5" rx="7" ry="4.8" transform="rotate(-9 8 15.5)" fill="#6e5244"/>
      <ellipse cx="6.8" cy="13.6" rx="3.8" ry="2.1" transform="rotate(-9 6.8 13.6)" fill="#aaae8e" opacity="0.38"/>
      {/* Rock 2 — medium back-right, Chocolate family */}
      <ellipse cx="19" cy="15.8" rx="6" ry="4.1" transform="rotate(7 19 15.8)" fill="#8c5a38"/>
      <ellipse cx="18.2" cy="14.3" rx="3" ry="1.7" transform="rotate(7 18.2 14.3)" fill="#d4a07a" opacity="0.38"/>
      {/* Rock 3 — front centre, darkest (Deep Mocha) */}
      <ellipse cx="13" cy="19.5" rx="5.5" ry="3.5" fill="#503b31"/>
      <ellipse cx="11.8" cy="18.3" rx="2.8" ry="1.5" fill="#9e8878" opacity="0.35"/>
      {/* Pebble — small top, Dry Sage tone */}
      <ellipse cx="12.5" cy="10.5" rx="3.2" ry="2.1" transform="rotate(-6 12.5 10.5)" fill="#aaae8e"/>
      <ellipse cx="11.8" cy="9.7" rx="1.6" ry="0.95" fill="#d0d4b8" opacity="0.5"/>
      {/* Pebble — tiny right, Hunter Green tone */}
      <ellipse cx="20.5" cy="10.8" rx="2.4" ry="1.6" transform="rotate(14 20.5 10.8)" fill="#4e7a55"/>
      <ellipse cx="19.9" cy="10.1" rx="1.2" ry="0.75" fill="#aaae8e" opacity="0.45"/>
    </svg>
  );

  function getCareIcon(key) {
    if (key === "substrate") return <SubstrateIcon/>;
    return <span style={{fontSize:22,lineHeight:1}}>{CARE_ICONS[key]||"\u{1F33F}"}</span>;
  }

  // Brand palette: Hunter Green #386641 · Dry Sage #aaae8e · Chocolate #d56f3e · Deep Mocha #503b31 · Steel Blue #4a7b9d
  const palette = {
    aquatic:    { accent:"#4a7b9d", tint:"#e4ecf4", mid:"#8db5cf", label:"🐠 Aquatic" },
    terrarium:  { accent:"#d56f3e", tint:"#faeae0", mid:"#e8a87a", label:"🌿 Terrarium" },
    vivarium:   { accent:"#386641", tint:"#e2ebe3", mid:"#aaae8e", label:"🦎 Vivarium" },
    houseplant: { accent:"#a7cab1", tint:"#eef5f0", mid:"#c8dfd2", label:"🪴 Houseplant" },
    exotic:     { accent:"#593f62", tint:"#f0eaf3", mid:"#b89fc0", label:"🌺 Exotic" },
  };
  const difficultyColor = {
    Beginner:"#386641", Easy:"#386641",
    Intermediate:"#d56f3e", Medium:"#d56f3e",
    Advanced:"#7a2020", Expert:"#7a2020", "Special Care":"#503b31",
  };
  const growthRateColor = {
    Slow:"#4a7b9d",
    Moderate:"#d56f3e",
    Fast:"#386641",
  };
  const PW_L=522, PW_R=601, PH=794, SCALE=0.45, BINDING=0;  // A4 fold: 297x210mm, no binding margin

  // ── Templates ──────────────────────────────────────────────────────────────
  function blankPlant(habitat="aquatic") {
    return {
      commonName:"", scientificName:"", family:"", origin:"",
      habitat, difficulty:"Beginner", growthRate:"Slow",
      maxSize:"", placement:"", tagline:"", description:"",
      identification:[
        {label:"Leaf Shape",     value:""},
        {label:"Leaf Color",     value:""},
        {label:"Leaf Size",      value:""},
        {label:"Stem / Rhizome", value:""},
        {label:"Root Type",      value:""},
        {label:"Flowering",      value:""},
      ],
      care:{
        lighting:    {value:"", detail:"", icon:"☀️"},
        temperature: {value:"", detail:"", icon:"🌡️"},
        water:       {value:"", detail:"", icon:"💧"},
        substrate:   {value:"", detail:"", icon:"🪨"},
        fertilizer:  {value:"", detail:"", icon:"🌱"},
        co2:         {value:"", detail:"", icon:"💨"},
        humidity:    {value:"", detail:"", icon:"🌫️"},
        flow:        {value:"", detail:"", icon:"🌊"},
      },
      compatibleWith:[], propagation:"", warnings:["",""], tags:[],
      sku:`TS-${SKU_PREFIX[habitat]||"XX"}-${String(Math.floor(1000+Math.random()*9000))}`,
      price:"", qrUrl:"", leafNumber:"",
    };
  }

  const DEFAULT_PLANT = {
  commonName: "Philodendron Micans",
  scientificName: "Philodendron hederaceum var. hederaceum",
  family: "Araceae",
  origin: "Mexico, Caribbean, Central America",
  habitat: "terrarium",
  difficulty: "Beginner",
  growthRate: "Moderate",
  maxSize: "Vines to 60+ cm (24+ in) · Leaves: 5–15 cm (2–6 in)",
  placement: "Background / Climbing",
  tagline: "Velvety, iridescent foliage that catches the light — a jewel for any tropical terrarium.",
  description: "Philodendron micans is a vining aroid celebrated for its heart-shaped leaves finished in rich, velvety bronze-green with an iridescent purple-pink sheen on new growth. In terrariums it thrives as a climbing background plant, readily attaching to cork bark or moss poles, and rewards consistent warmth and humidity with fast, lush growth.",
  identification: [
    { label: "Leaf Shape",   value: "Cordate (heart-shaped)" },
    { label: "Leaf Texture", value: "Velvety, iridescent surface" },
    { label: "Leaf Color",   value: "Bronze-green; pink-purple new growth" },
    { label: "Leaf Size",    value: "5–15 cm mature; larger with support" },
    { label: "Stem",         value: "Reddish-brown, semi-woody with age" },
    { label: "Growth Form",  value: "Vining; produces aerial roots" },
  ],
  care: {
    lighting:    { value: "Low – Medium",  detail: "Indirect; tolerates low light",  icon: "☀️" },
    temperature: { value: "18–29 °C",      detail: "65–85 °F; avoid below 15 °C",   icon: "🌡️" },
    humidity:    { value: "60–90 %",       detail: "High humidity preferred",        icon: "🌫️" },
    substrate:   { value: "Airy & rich",   detail: "ABG mix or coco + perlite",      icon: "🪨" },
    watering:    { value: "Even moisture", detail: "Allow top inch to dry slightly", icon: "💧" },
    fertilizer:  { value: "Moderate",      detail: "Dilute liquid feed monthly",     icon: "🌱" },
    co2:         { value: "Ambient",       detail: "No supplementation needed",      icon: "💨" },
    airflow:     { value: "Gentle",        detail: "Good ventilation prevents rot",  icon: "🌀" },
  },
  compatibleWith: ["Dart Frogs", "Geckos", "Isopods", "Springtails", "Other Aroids"],
  propagation: "Stem cuttings with at least one node root easily in moist sphagnum or directly in substrate. Keep humid and warm (24 °C+) until roots establish.",
  warnings: [
    "Toxic to cats, dogs, and humans if ingested — handle with care.",
    "Direct sun will bleach and scorch the velvety leaves.",
  ],
  tags: ["Terrarium", "Beginner", "Vining", "High Humidity", "Background"],
  sku: "TS-TR-0117",
  price: "$12.99",
  qrUrl: "https://terrascaper.com/plants/philodendron-micans",
  };
  // ── localStorage ───────────────────────────────────────────────────────────
  const loadLibrary = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch { return []; } };
  const saveLibrary = lib => localStorage.setItem(STORAGE_KEY, JSON.stringify(lib));

  // ── Catalog sync ──────────────────────────────────────────────────────────
  const CATALOG_KEY = 'ts_catalog_library_v1';
  function syncToCatalog(plant) {
    try {
      const existing = JSON.parse(localStorage.getItem(CATALOG_KEY) || '[]');
      const idx = existing.findIndex(p => p.sku === plant.sku);
      const entry = {
        sku: plant.sku, commonName: plant.commonName,
        scientificName: plant.scientificName, habitat: plant.habitat,
        difficulty: plant.difficulty, growthRate: plant.growthRate,
        price: plant.price, tagline: plant.tagline,
        placement: plant.placement, source: 'generator',
      };
      const updated = idx >= 0 ? existing.map((p,i) => i===idx ? entry : p) : [...existing, entry];
      localStorage.setItem(CATALOG_KEY, JSON.stringify(updated));
    } catch(e) { console.warn('Catalog sync failed:', e); }
  }
  function removeFromCatalog(plant) {
    try {
      const existing = JSON.parse(localStorage.getItem(CATALOG_KEY) || '[]');
      localStorage.setItem(CATALOG_KEY, JSON.stringify(existing.filter(p => p.sku !== plant.sku)));
    } catch(e) {}
  }

  // ══════════════════════════════════════════════════════════════════════════
  // BROCHURE COMPONENTS
  // ══════════════════════════════════════════════════════════════════════════

  // ── Self-registration in catalog ─────────────────────────────────────────
  // When a brochure is opened, it writes its plant data + filename to the
  // shared catalog registry so the catalog can discover it automatically.
  function registerInCatalog(plant) {
    try {
      const existing = JSON.parse(localStorage.getItem(CATALOG_KEY) || '[]');
      const filename  = window.location.pathname.split('/').pop() || window.location.href.split('/').pop();
      const entry = {
        sku:            plant.sku,
        commonName:     plant.commonName,
        scientificName: plant.scientificName,
        habitat:        plant.habitat,
        difficulty:     plant.difficulty,
        growthRate:     plant.growthRate,
        price:          plant.price,
        tagline:        plant.tagline,
        placement:      plant.placement,
        file:           filename,
        source:         'brochure',
      };
      const idx = existing.findIndex(p => p.sku === entry.sku);
      const updated = idx >= 0 ? existing.map((p,i) => i===idx ? entry : p) : [...existing, entry];
      localStorage.setItem(CATALOG_KEY, JSON.stringify(updated));
    } catch(e) { console.warn('Catalog registration failed:', e); }
  }

  // ── Photo persistence (shared with catalog via localStorage) ─────────────
  const PHOTOS_KEY = 'ts_catalog_photos_v1';
  function loadPhotosForSku(sku) {
    try {
      const all = JSON.parse(localStorage.getItem(PHOTOS_KEY) || '{}');
      return { cover: all[sku+'_cover']||null, closeup: all[sku+'_closeup']||null, leaf: all[sku+'_leaf']||null };
    } catch { return { cover:null, closeup:null, leaf:null }; }
  }
  function savePhotoForSku(sku, slot, dataUrl) {
    try {
      const all = JSON.parse(localStorage.getItem(PHOTOS_KEY) || '{}');
      if (dataUrl) all[sku+'_'+slot] = dataUrl; else delete all[sku+'_'+slot];
      localStorage.setItem(PHOTOS_KEY, JSON.stringify(all));
    } catch(e) {}
  }

  function PhotoSlot({label, height, accent, tint, src, onSrc}) {
    const ref = useRef();
    const load = e => {
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader(); r.onload = ev => onSrc(ev.target.result); r.readAsDataURL(f);
    };
    return (
      <div onClick={()=>ref.current.click()} style={{
        width:"100%", height, borderRadius:8, border:src?`none`:`2px dashed ${accent}44`,
        background:src?"#fff":tint, cursor:"pointer", overflow:"hidden",
        display:"flex", alignItems:"center", justifyContent:"center",
        flexDirection:"column", gap:4, position:"relative",
      }}>
        <input ref={ref} type="file" accept="image/*" onChange={load} style={{display:"none"}}/>
        {src ? (
          <>
            <img src={src} alt={label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}
              style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",opacity:0,transition:"opacity .2s",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'Josefin Sans',sans-serif",fontSize:11,letterSpacing:"0.1em",color:"#fff"}}>Replace</div>
          </>
        ) : (
          <>
            <div style={{fontSize:20,opacity:0.25}}>📷</div>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:accent+"88",letterSpacing:"0.12em",textTransform:"uppercase"}}>{label}</div>
          </>
        )}
      </div>
    );
  }

  // ── Design tokens ─────────────────────────────────────────────────────────
  // Label style: uppercase category headings inside panels
  const T = {
    label:  { fontFamily:"'Josefin Sans',sans-serif", fontSize:11, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase" },
    value:  { fontFamily:"'Source Sans 3',sans-serif", fontSize:15, fontWeight:700, lineHeight:1.2 },
    detail: { fontFamily:"'Source Sans 3',sans-serif", fontSize:12, fontWeight:400, lineHeight:1.5, color:"#333" },
    body:   { fontFamily:"'Source Sans 3',sans-serif", fontSize:13, fontWeight:400, lineHeight:1.65, color:"#222" },
    footer: { fontFamily:"'Josefin Sans',sans-serif", fontSize:11, letterSpacing:"0.12em" },
  };

  const SH = ({title,c}) => (
    <div style={{marginBottom:16}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:c.accent,letterSpacing:"-0.01em"}}>{title}</div>
      <div style={{height:2.5,background:`linear-gradient(to right,${c.accent},${c.mid}55)`,marginTop:6}}/>
    </div>
  );
  const SkuBadge = ({value}) => (
    <div style={{background:"#f0f0f0",border:"1px solid #ccc",borderRadius:7,padding:"5px 13px",display:"flex",gap:7,alignItems:"center"}}>
      <span style={{...T.label,fontSize:10,color:"#666"}}>SKU</span>
      <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:13,fontWeight:600,color:"#222",letterSpacing:"0.06em"}}>{value}</span>
    </div>
  );
  const PriceBadge = ({value,c}) => (
    <div style={{background:c.tint,border:`1px solid ${c.mid}`,borderRadius:7,padding:"5px 15px",display:"flex",gap:6,alignItems:"center"}}>
      <span style={{...T.label,fontSize:10,color:c.accent}}>MSRP</span>
      <span style={{fontFamily:"'Josefin Sans',sans-serif",fontWeight:700,fontSize:16,color:c.accent}}>{value||"—"}</span>
    </div>
  );
  const Panel = ({children,right,w}) => (
    <div style={{width:w||(right?PW_R:PW_L),height:PH,background:"#ffffff",flexShrink:0,overflow:"hidden",
      position:"relative",fontFamily:"'Source Sans 3',sans-serif",boxSizing:"border-box",
      borderLeft:right?"1px solid #e8e8e8":"none"}}>{children}</div>
  );

  // ── Leaf number badge ────────────────────────────────────────────────────
  const LeafBadge = ({number, c}) => {
    if (!number) return null;
    const n = String(number);
    const fs = n.length <= 2 ? 42 : n.length === 3 ? 30 : 22;
    return (
      <div style={{position:"relative", width:90, height:100, flexShrink:0, filter:`drop-shadow(0 4px 10px ${c.accent}66)`, transform:"rotate(45deg)", transformOrigin:"center center"}}>
        <svg viewBox="0 0 90 100" width="90" height="100" xmlns="http://www.w3.org/2000/svg">
          <path d="M45 14 C40 5,6 10,4 34 C2 54,16 72,30 82 C36 87,42 91,45 93 C48 91,54 87,60 82 C74 72,88 54,86 34 C84 10,50 5,45 14 Z" fill={c.accent}/>
          <path d="M45 16 C48 6,72 12,80 30 C84 44,78 60,68 72 C78 56,84 38,80 24 C74 10,58 6,45 16 Z" fill="rgba(255,255,255,0.07)"/>
          <path d="M30 12 C36 10,42 14,45 14 C48 14,54 10,60 12" fill="none" stroke="rgba(0,0,0,0.15)" strokeWidth="1" strokeLinecap="round"/>
          <path d="M45 14 C44 38,44 64,45 91" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="2.2" strokeLinecap="round"/>
          <path d="M45 22 Q66 16 80 26" fill="none" stroke="rgba(255,255,255,0.32)" strokeWidth="1.4" strokeLinecap="round"/>
          <path d="M45 32 Q68 30 82 44" fill="none" stroke="rgba(255,255,255,0.28)" strokeWidth="1.3" strokeLinecap="round"/>
          <path d="M45 46 Q68 46 80 58" fill="none" stroke="rgba(255,255,255,0.24)" strokeWidth="1.2" strokeLinecap="round"/>
          <path d="M45 60 Q66 62 72 72" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="1.1" strokeLinecap="round"/>
          <path d="M45 74 Q56 76 60 84" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeLinecap="round"/>
          <path d="M45 22 Q24 16 10 26" fill="none" stroke="rgba(255,255,255,0.32)" strokeWidth="1.4" strokeLinecap="round"/>
          <path d="M45 32 Q22 30 8 44" fill="none" stroke="rgba(255,255,255,0.28)" strokeWidth="1.3" strokeLinecap="round"/>
          <path d="M45 46 Q22 46 10 58" fill="none" stroke="rgba(255,255,255,0.24)" strokeWidth="1.2" strokeLinecap="round"/>
          <path d="M45 60 Q24 62 18 72" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="1.1" strokeLinecap="round"/>
          <path d="M45 74 Q34 76 30 84" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeLinecap="round"/>
          <path d="M44 90 C43 94 41 98 40 100" stroke="rgba(255,255,255,0.35)" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
          <path d="M46 90 C47 94 48 98 49 100" stroke="rgba(255,255,255,0.25)" strokeWidth="2" strokeLinecap="round" fill="none"/>
          <path d="M45 14 C40 5,6 10,4 34 C2 54,16 72,30 82 C36 87,42 91,45 93 C48 91,54 87,60 82 C74 72,88 54,86 34 C84 10,50 5,45 14 Z" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="1.2"/>
        </svg>
        <div style={{position:"absolute", top:"14%", left:0, width:"100%", height:"64%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, transform:"rotate(-45deg)", transformOrigin:"center center"}}>
          <span style={{fontFamily:"'Josefin Sans',sans-serif", fontSize:fs, fontWeight:700, color:"#fff", letterSpacing:"0.04em", textShadow:"0 1px 5px rgba(0,0,0,0.5)", lineHeight:1}}>{n}</span>
          <span style={{fontFamily:"'Josefin Sans',sans-serif", fontSize:7, fontWeight:600, color:"rgba(255,255,255,0.65)", letterSpacing:"0.2em", textTransform:"uppercase", lineHeight:1}}>No.</span>
        </div>
      </div>
    );
  };

  function FrontCover({p,c,coverSrc,onCoverSrc}) {
    return (
      <div style={{height:"100%",display:"flex",flexDirection:"column",padding:"34px",position:"relative"}}>
        {/* Leaf badge — absolutely positioned in top-right corner */}
        {p.leafNumber && (
          <div style={{position:"absolute",top:0,right:0,zIndex:10}}>
            <LeafBadge number={p.leafNumber} c={c}/>
          </div>
        )}
        {/* Brand header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,paddingRight:90}}>
          <div>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontWeight:700,fontSize:18,letterSpacing:"0.28em",color:c.accent,textTransform:"uppercase"}}>Terra Scaper</div>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontWeight:600,fontSize:11,letterSpacing:"0.2em",color:"#555",textTransform:"uppercase",marginTop:3}}>Plant Care Guide</div>
          </div>
          <span style={{background:c.tint,color:c.accent,border:`1.5px solid ${c.mid}`,borderRadius:20,padding:"6px 15px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13}}>{c.label}</span>
        </div>
        <div style={{height:2.5,background:`linear-gradient(to right,${c.accent},${c.mid}55)`,marginBottom:14,flexShrink:0}}/>
        {/* Plant name */}
        <div style={{textAlign:"center",marginBottom:14}}>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:44,fontWeight:700,lineHeight:1.1,color:"#111"}}>{p.commonName||"Plant Name"}</h1>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:17,color:c.accent,marginTop:8,opacity:0.85}}>{p.scientificName||<span style={{opacity:0.35}}>Scientific name</span>}</div>
        </div>
        {/* Photo */}
        <div style={{flex:1,minHeight:0,marginBottom:8,overflow:"hidden"}}><PhotoSlot label="Overall Plant Photo" height="100%" accent={c.accent} tint={c.tint} src={coverSrc} onSrc={onCoverSrc}/></div>
        {/* Tagline */}
        <p style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:13,color:"#333",lineHeight:1.6,textAlign:"center",marginBottom:10}}>{p.tagline}</p>
        {/* Bottom strip */}

  function DataEntryPanel({plant, setPlant, library, onSave, onDelete, onExport, onImport, c}) {
    const [open, setOpen] = useState({basic:true, care:false, identification:false, details:false});
    const importRef = useRef();
    const tog = k => setOpen(o=>({...o,[k]:!o[k]}));

    const set    = (f,v)     => setPlant(p=>({...p,[f]:v}));
    const setCare = (k,f,v) => setPlant(p=>({...p,care:{...p.care,[k]:{...p.care[k],[f]:v}}}));
    const setRow  = (i,f,v) => setPlant(p=>({...p,identification:p.identification.map((r,j)=>j===i?{...r,[f]:v}:r)}));
    const setArr  = (f,v)   => set(f, v.split(",").map(s=>s.trim()).filter(Boolean));

    const inp = {border:"1px solid #e0e0e0",borderRadius:6,padding:"7px 10px",
      fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#333",background:"#fafafa",width:"100%"};
    const lbl = {fontFamily:"'Josefin Sans',sans-serif",fontSize:9,letterSpacing:"0.12em",
      textTransform:"uppercase",color:"#999",marginBottom:3,display:"block"};
    const btn = (bg,col,border)=>({background:bg,color:col,border:border?`1px solid ${col}44`:"1px solid #e8e8e8",
      borderRadius:7,padding:"6px 11px",fontFamily:"'Josefin Sans',sans-serif",
      letterSpacing:"0.07em",cursor:"pointer",fontWeight:600,fontSize:11,whiteSpace:"nowrap"});

    const AccHead = ({title, k, icon}) => (
      <button onClick={()=>tog(k)} style={{
        width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",
        background:"none",border:"none",borderBottom:`1px solid ${c.mid}55`,
        padding:"9px 0 7px",cursor:"pointer",marginBottom:open[k]?12:0,
      }}>
        <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:c.accent,fontWeight:600}}>{icon} {title}</span>
        <span style={{color:c.accent,transition:"transform 0.2s",display:"inline-block",transform:open[k]?"rotate(180deg)":"none"}}>▾</span>
      </button>
    );

    const isInLibrary = library.some(lp=>lp.commonName===plant.commonName&&lp.habitat===plant.habitat&&plant.commonName);

    return (
      <div style={{background:"#fff",border:`1px solid ${c.mid}88`,borderRadius:12,padding:"16px 18px",marginBottom:20}}>

        {/* ── Library ─────────────────────────────────────────────────── */}
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"'Josefin Sans',sans-serif",fontWeight:600,fontSize:12,letterSpacing:"0.14em",color:c.accent,textTransform:"uppercase",marginBottom:10}}>📚 Plant Library</div>
          {library.length===0
            ? <div style={{fontSize:12,color:"#bbb",fontFamily:"'Source Sans 3',sans-serif",marginBottom:8,fontStyle:"italic"}}>No plants saved yet. Fill in the form below and hit Save.</div>
            : <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {library.map((lp,i)=>{
                  const lc=palette[lp.habitat]||palette.aquatic;
                  const active=plant.commonName===lp.commonName&&plant.habitat===lp.habitat;
                  return (
                    <button key={i} onClick={()=>setPlant(lp)} style={{
                      padding:"5px 13px",borderRadius:20,cursor:"pointer",
                      border:`1.5px solid ${active?lc.accent:lc.mid}`,
                      background:active?lc.tint:"#fafafa",
                      color:active?lc.accent:"#666",
                      fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:active?700:400,
                    }}>
                      {lc.label.split(" ")[0]} {lp.commonName||"Unnamed"}
                    </button>
                  );
                })}
              </div>
          }
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button onClick={()=>setPlant(blankPlant(plant.habitat))} style={btn("#f5f5f5","#555")}>+ New</button>
            <button onClick={onSave} style={btn(c.accent,"#fff")}>💾 Save</button>
            {isInLibrary && <button onClick={onDelete} style={btn("#fff5f5","#c62828",true)}>🗑 Delete</button>}
            <div style={{flex:1}}/>
            <button onClick={onExport} style={btn("#f5f5f5","#666")}>⬆ Export</button>
            <button onClick={()=>importRef.current.click()} style={btn("#f5f5f5","#666")}>⬇ Import</button>
            <input ref={importRef} type="file" accept=".json" onChange={onImport} style={{display:"none"}}/>
          </div>
        </div>

        {/* ── Basic Info ──────────────────────────────────────────────── */}

        {open.basic && (
          <div style={{marginBottom:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

              <div><label style={lbl}>Family</label><input style={inp} value={plant.family} onChange={e=>set("family",e.target.value)} placeholder="e.g. Polypodiaceae"/></div>

              <div><label style={lbl}>Placement</label><input style={inp} value={plant.placement} onChange={e=>set("placement",e.target.value)} placeholder="e.g. Midground / Hardscape"/></div>
              <div><label style={lbl}>Price</label><input style={inp} value={plant.price} onChange={e=>set("price",e.target.value)} placeholder="$9.99"/></div>
              <div><label style={lbl}>SKU</label><input style={inp} value={plant.sku} onChange={e=>set("sku",e.target.value)} placeholder="TS-AQ-0001"/></div>
              <div><label style={lbl}>Leaf Number <span style={{opacity:0.5}}>(1–9999)</span></label><input style={inp} type="number" min="1" max="9999" value={plant.leafNumber||""} onChange={e=>{ const v=e.target.value; set("leafNumber", v===""?"":String(Math.min(9999,Math.max(1,parseInt(v)||1))));}} placeholder="e.g. 42"/></div>
              <div>
                <label style={lbl}>Difficulty</label>
                <select style={inp} value={plant.difficulty} onChange={e=>set("difficulty",e.target.value)}>
                  {["Beginner","Easy","Intermediate","Medium","Advanced","Expert","Special Care"].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
              <div>
                <label style={lbl}>Growth Rate</label>
                <select style={inp} value={plant.growthRate} onChange={e=>set("growthRate",e.target.value)}>
                  {["Slow","Moderate","Fast"].map(d=><option key={d}>{d}</option>)}

                    flex:1,padding:"7px 2px",border:`1.5px solid ${plant.habitat===h?pc.accent:"#e0e0e0"}`,

                    fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontWeight:plant.habitat===h?700:400,

            </div>
            <div style={{marginBottom:8}}>
              <label style={lbl}>Tagline <span style={{opacity:0.5}}>(front &amp; back cover · max 15 words)</span></label>
              <input style={inp} value={plant.tagline} onChange={e=>set("tagline",e.target.value)} placeholder="A compelling one-line retail description…"/>
            </div>
            <div>
              <label style={lbl}>QR URL</label>
              <input style={inp} value={plant.qrUrl} onChange={e=>set("qrUrl",e.target.value)} placeholder="https://terrascaper.com/plants/…"/>
            </div>
          </div>
        )}

        {/* ── Care Parameters ─────────────────────────────────────────── */}
        <AccHead title="Care Parameters" k="care" icon="💧"/>
        {open.care && (
          <div style={{marginBottom:14}}>
            {Object.keys(plant.care).map(key=>(
              <div key={key} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr",gap:6,alignItems:"end",marginBottom:8}}>
                <span style={{fontSize:20,paddingBottom:6}}>{CARE_ICONS[key]}</span>
                <div>
                  <label style={lbl}>{CARE_LABELS[key]}</label>
                  <input style={inp} value={plant.care[key].value} onChange={e=>setCare(key,"value",e.target.value)} placeholder="e.g. Low – Medium"/>
                </div>
                <div>
                  <label style={lbl}>Detail</label>
                  <input style={inp} value={plant.care[key].detail} onChange={e=>setCare(key,"detail",e.target.value)} placeholder="e.g. 20–50 PAR"/>
                </div>
              </div>
            ))}
          </div>

            </div>
            {plant.identification.map((row,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:6,marginBottom:6}}>
                <input style={inp} value={row.label} onChange={e=>setRow(i,"label",e.target.value)}/>
                <input style={inp} value={row.value} onChange={e=>setRow(i,"value",e.target.value)} placeholder="—"/>
              </div>
            ))}
          </div>
        )}

        {/* ── Details ─────────────────────────────────────────────────── */}
        <AccHead title="Details" k="details" icon="📋"/>
        {open.details && (
          <div style={{marginBottom:6}}>
            <div style={{marginBottom:8}}>
              <label style={lbl}>Compatible With <span style={{opacity:0.5}}>(comma separated)</span></label>
              <input style={inp} value={plant.compatibleWith.join(", ")} onChange={e=>setArr("compatibleWith",e.target.value)} placeholder="Shrimp, Tetras, Snails…"/>
            </div>
            <div style={{marginBottom:8}}>
              <label style={lbl}>Propagation</label>
              <textarea style={{...inp,minHeight:64,resize:"vertical"}} value={plant.propagation} onChange={e=>set("propagation",e.target.value)} placeholder="How to propagate this plant…"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={lbl}>Warning 1</label><input style={inp} value={plant.warnings[0]||""} onChange={e=>set("warnings",[e.target.value,plant.warnings[1]||""])} placeholder="Care warning…"/></div>
              <div><label style={lbl}>Warning 2</label><input style={inp} value={plant.warnings[1]||""} onChange={e=>set("warnings",[plant.warnings[0]||"",e.target.value])} placeholder="Care warning…"/></div>
            </div>
            <div>
              <label style={lbl}>Tags <span style={{opacity:0.5}}>(comma separated)</span></label>
              <input style={inp} value={plant.tags.join(", ")} onChange={e=>setArr("tags",e.target.value)} placeholder="Beginner, Low Light, Nano Tank…"/>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════════
  // APP
  // ══════════════════════════════════════════════════════════════════════════
  function App() {
    const [plant,      setPlant]      = useState(() => {
      try {
        const saved = JSON.parse(localStorage.getItem('ts_brochure_edits_v1') || '{}');
        return saved[DEFAULT_PLANT.sku] ? Object.assign({}, DEFAULT_PLANT, saved[DEFAULT_PLANT.sku]) : DEFAULT_PLANT;
      } catch(e) { return DEFAULT_PLANT; }
    });
    const [library,    setLibrary]    = useState(loadLibrary);
    const [coverSrc,   setCoverSrc]   = useState(null);
    const [closeupSrc, setCloseupSrc] = useState(null);
    const [leafSrc,    setLeafSrc]    = useState(null);

    const c = palette[plant.habitat] || palette.aquatic;

    useEffect(()=>{ document.documentElement.style.setProperty("--accent", c.accent); }, [c.accent]);

    // Load persisted photos + register plant in catalog whenever active plant changes
    useEffect(() => {
      const saved = loadPhotosForSku(plant.sku);
      setCoverSrc(saved.cover);
      setCloseupSrc(saved.closeup);
      setLeafSrc(saved.leaf);
      registerInCatalog(plant);
      // Auto-trigger PDF export if catalog requested it for this plant
      const trigger = localStorage.getItem('ts_auto_pdf_trigger');
      if (trigger && trigger === plant.sku) {
        localStorage.removeItem('ts_auto_pdf_trigger');
        // Delay to allow photos + layout to fully render before capture
        setTimeout(() => {
          const btn = document.querySelector('[data-pdf-trigger]');
          if (btn) btn.click();
        }, 2200);
      }
    }, [plant.sku]);

    // Persist photos to localStorage whenever they change
    // Photos are saved directly in the update handlers (not via effects) to avoid
    // race conditions when switching plants
    const updateCoverSrc   = val => { setCoverSrc(val);   savePhotoForSku(plant.sku, 'cover',   val); };
    const updateCloseupSrc = val => { setCloseupSrc(val); savePhotoForSku(plant.sku, 'closeup', val); };
    const updateLeafSrc    = val => { setLeafSrc(val);    savePhotoForSku(plant.sku, 'leaf',    val); };

    const handleSetPlant = p => { setPlant(p); };

    const handleSave = () => {
      const idx = library.findIndex(lp=>lp.commonName===plant.commonName&&lp.habitat===plant.habitat);
      const lib  = idx>=0 ? library.map((lp,i)=>i===idx?plant:lp) : [...library, plant];
      setLibrary(lib); saveLibrary(lib);
      syncToCatalog(plant);
      registerInCatalog(plant);
      // Persist edits to localStorage
      try {
        const edits = JSON.parse(localStorage.getItem('ts_brochure_edits_v1') || '{}');
        edits[plant.sku] = plant;
        localStorage.setItem('ts_brochure_edits_v1', JSON.stringify(edits));
      } catch(e) {}
      // Download updated brochure with edited plant data baked in
      try {
        const scriptEl = document.querySelector('script[type="text/babel"]');
        if (!scriptEl) return;
        const src = scriptEl.textContent;
        const MS  = '  const DEFAULT_PLANT = {';
        const ME  = '\n  };';
        const si  = src.indexOf(MS);
        const ei  = src.indexOf(ME, si) + ME.length;
        if (si < 0 || ei < MS.length) return;
        const json  = JSON.stringify(plant, null, 4);
        const inner = json.slice(1, -1).split('\n').map(l => '  ' + l).join('\n');
        const newSrc = src.slice(0, si) + MS + '\n' + inner + ME + src.slice(ei);
        const fullHtml = document.documentElement.outerHTML.replace(scriptEl.textContent, newSrc);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([fullHtml], {type:'text/html'}));
        a.download = window.location.pathname.split('/').pop() || ('TerrascaperBrochure-' + plant.sku + '.html');
        a.click();
        URL.revokeObjectURL(a.href);
      } catch(e) { console.warn('Download failed:', e); }
    };

    const handleDelete = () => {
      const lib = library.filter(lp=>!(lp.commonName===plant.commonName&&lp.habitat===plant.habitat));
      setLibrary(lib); saveLibrary(lib);
      removeFromCatalog(plant);
    };

    const handleExport = () => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(library,null,2)],{type:"application/json"}));
      a.download = "terrascaper-plant-library.json";
      a.click();
    };

    const handleImport = e => {
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev => {
        try {
          const imp = JSON.parse(ev.target.result);
          if(!Array.isArray(imp)){ alert("Invalid file — expected a JSON array."); return; }
          const merged = [...library];
          imp.forEach(ip=>{ if(!merged.some(lp=>lp.commonName===ip.commonName&&lp.habitat===ip.habitat)) merged.push(ip); });
          setLibrary(merged); saveLibrary(merged);
          alert(`Imported ${imp.length} plant(s). Duplicates skipped.`);
        } catch { alert("Could not parse the file."); }
      };
      r.readAsText(f); e.target.value="";
    };

    const handleExportPdf = async () => {
      const spreads = document.querySelectorAll('.for-print');
      if (!spreads.length) { alert('Nothing to export.'); return; }

      // ── Step 1: Show spreads at top of viewport (not off-screen)
      spreads.forEach(el => {
        el.style.display   = 'flex';
        el.style.position  = 'fixed';
        el.style.top       = '0';
        el.style.left      = '0';
        el.style.width     = '1123px';
        el.style.height    = '794px';
        el.style.overflow  = 'hidden';
        el.style.zIndex    = '99999';
        el.style.pointerEvents = 'none';
      });

      // ── Step 2: Two rAF ticks so browser fully computes layout
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 100));

      // ── Step 3: Wait for every image to load AND decode (guarantees paint)
      const allImgs = [...document.querySelectorAll('.for-print img')];
      await Promise.all(allImgs.map(img => {
        const load = img.complete && img.naturalWidth > 0
          ? Promise.resolve()
          : new Promise(res => { img.onload = res; img.onerror = res; });
        // decode() ensures the image is fully rasterised before capture
        return load.then(() => img.decode ? img.decode().catch(()=>{}) : Promise.resolve());
      }));

      // ── Step 4: Stamp explicit px dimensions on ALL elements in the live DOM
      //    so html2canvas never has to resolve % or flex-based sizes in its clone.
      //    Store original values so we can restore them exactly.
      const stamped = [];
      spreads.forEach(spread => {
        [...spread.querySelectorAll('*'), spread].forEach(el => {
          const cs   = window.getComputedStyle(el);
          const origH = el.style.height;
          const origW = el.style.width;
          const origMin = el.style.minHeight;
          const origMax = el.style.maxHeight;
          const ch = cs.height;
          const cw = cs.width;
          if (ch && ch !== 'auto' && ch !== 'none') {
            el.style.height    = ch;
            el.style.minHeight = ch;
            el.style.maxHeight = ch;
          }
          if (cw && cw !== 'auto' && cw !== 'none') {
            el.style.width = cw;
          }
          stamped.push({ el, origH, origW, origMin, origMax });
        });
      });

      // One more frame after stamping to let browser re-paint
      await new Promise(r => requestAnimationFrame(r));

      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:[297, 210] });

        for (let i = 0; i < spreads.length; i++) {
          if (i > 0) pdf.addPage([297, 210], 'landscape');

          const canvas = await html2canvas(spreads[i], {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false,
            imageTimeout: 0,
            backgroundColor: '#ffffff',
            width:  1123,
            height: 794,
          });

          pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);
        }

        const slug = (plant.commonName||'brochure').toLowerCase()
          .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        pdf.save(`terrascaper-${slug}.pdf`);

      } finally {
        // ── Restore all stamped styles
        stamped.forEach(({ el, origH, origW, origMin, origMax }) => {
          el.style.height    = origH;
          el.style.width     = origW;
          el.style.minHeight = origMin;
          el.style.maxHeight = origMax;
        });
        spreads.forEach(el => { el.style.cssText = ''; });
      }
    };

    return (
      <div style={{background:"#e6e1dc",minHeight:"100vh",padding:"28px 20px"}}>

        {/* ── SCREEN UI ──────────────────────────────────────────────── */}
        <div className="no-print" style={{maxWidth:530,margin:"0 auto 28px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontFamily:"'Josefin Sans',sans-serif",fontWeight:600,fontSize:20,letterSpacing:"0.25em",color:c.accent}}>TERRA SCAPER</div>
              <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:12,color:"#888",marginTop:2}}>Brochure Builder · A4 Fold at 138mm</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button data-pdf-trigger onClick={handleExportPdf} style={{
                background:"#fff",color:c.accent,border:`2px solid ${c.accent}`,borderRadius:8,
                padding:"9px 16px",fontFamily:"'Josefin Sans',sans-serif",
                fontSize:12,letterSpacing:"0.1em",cursor:"pointer",fontWeight:700,
              }}>⬇ PDF</button>
              <button onClick={()=>window.print()} style={{
                background:c.accent,color:"#fff",border:"none",borderRadius:8,
                padding:"10px 18px",fontFamily:"'Josefin Sans',sans-serif",
                fontSize:12,letterSpacing:"0.1em",cursor:"pointer",fontWeight:600,
              }}>🖨 Print</button>
            </div>
          </div>

          <DataEntryPanel
            plant={plant} setPlant={handleSetPlant}
            library={library}
            onSave={handleSave} onDelete={handleDelete}
            onExport={handleExport} onImport={handleImport}
            c={c}
          />

          <div style={{background:"#fff",border:`1px solid ${c.mid}88`,borderRadius:10,padding:"13px 16px",marginBottom:24,fontSize:12,lineHeight:1.75,color:"#555"}}>
            <div style={{fontWeight:700,color:c.accent,fontFamily:"'Josefin Sans',sans-serif",letterSpacing:"0.08em",fontSize:11,textTransform:"uppercase",marginBottom:4}}>How to print &amp; bind</div>
            <ol style={{paddingLeft:16}}>
              <li>Print <strong>Sheet ①</strong> (Outside) — Landscape · A4 · No Scaling · Background graphics on</li>
              <li>Flip over, feed back through, print <strong>Sheet ②</strong> (Inside)</li>
              <li>Fold at <strong>138mm</strong> — front cover faces out</li>
              <li>Bind or staple through the <strong>left binding margin</strong></li>
            </ol>
          </div>
        </div>

        {/* ── SCREEN PREVIEWS ────────────────────────────────────────── */}
        <div className="no-print" style={{maxWidth:530,margin:"0 auto"}}>
          <SpreadPreview label="Sheet ① Outside — Print First (Front Cover | Back Cover)" step={1} c={c}>
            <Panel><FrontCover p={plant} c={c} coverSrc={coverSrc} onCoverSrc={updateCoverSrc}/></Panel>
            <Panel right><BackCover p={plant} c={c}/></Panel>
          </SpreadPreview>
          <SpreadPreview label="Sheet ② Inside — Print Second" step={2} c={c}>
            <Panel w={601}><InsideLeft p={plant} c={c}/></Panel>
            <Panel right w={522}><InsideRight p={plant} c={c} closeupSrc={closeupSrc} onCloseupSrc={updateCloseupSrc} leafSrc={leafSrc} onLeafSrc={updateLeafSrc}/></Panel>
          </SpreadPreview>
        </div>

        {/* ── PRINT-ONLY SPREADS ─────────────────────────────────────── */}
        <div className="for-print" style={{width:1123,height:794,flexShrink:0}}>
          <div style={{width:522,height:794,background:"#fff",overflow:"hidden",fontFamily:"'Source Sans 3',sans-serif",flexShrink:0}}><FrontCover p={plant} c={c} coverSrc={coverSrc} onCoverSrc={updateCoverSrc}/></div>
          <div style={{width:601,height:794,background:"#fff",overflow:"hidden",fontFamily:"'Source Sans 3',sans-serif",borderLeft:"1px solid #eee",flexShrink:0}}><BackCover p={plant} c={c}/></div>
        </div>
        <div className="for-print" style={{width:1123,height:794,flexShrink:0}}>
          <div style={{width:601,height:794,background:"#fff",overflow:"hidden",fontFamily:"'Source Sans 3',sans-serif",flexShrink:0}}><InsideLeft p={plant} c={c}/></div>
          <div style={{width:522,height:794,background:"#fff",overflow:"hidden",fontFamily:"'Source Sans 3',sans-serif",borderLeft:"1px solid #eee",flexShrink:0}}><InsideRight p={plant} c={c} closeupSrc={closeupSrc} onCloseupSrc={updateCloseupSrc} leafSrc={leafSrc} onLeafSrc={updateLeafSrc}/></div>
        </div>      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
